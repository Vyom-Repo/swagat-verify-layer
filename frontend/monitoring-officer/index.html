<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Officer Login — Grievance Verification System</title>
  <meta name="description" content="Secure login portal for Monitoring Officers to access the Grievance Resolution Verification Dashboard">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-icon"><i class="bi bi-shield-check"></i></div>
      <h2>Monitoring Officer Portal</h2>
      <p class="subtitle">Grievance Resolution Verification System</p>

      <form id="loginForm" autocomplete="off">
        <!-- Step 1: Officer ID -->
        <div class="mb-3" id="stepOfficerId">
          <label class="form-label" for="officerId">Officer ID / Mobile Number</label>
          <input type="text" class="form-control" id="officerId" placeholder="Enter Officer ID or Mobile" required>
        </div>

        <!-- Step 2: Password -->
        <div class="mb-3" id="stepPassword" style="display:none;">
          <label class="form-label" for="passwordInput">Password</label>
          <input type="password" class="form-control" id="passwordInput" placeholder="Enter your password">
          <div class="otp-msg" id="passMsg"></div>
        </div>

        <!-- Login Button -->
        <button type="button" class="btn btn-primary-custom mt-3" id="loginBtn" style="display:none;">
          <i class="bi bi-box-arrow-in-right me-1"></i> Login to Dashboard
        </button>
      </form>

      <div class="text-center mt-3" id="loginStatus"></div>
    </div>
  </div>

  <script>
    const officerIdEl = document.getElementById('officerId');
    const stepPassword = document.getElementById('stepPassword');
    const passwordInput = document.getElementById('passwordInput');
    const passMsg = document.getElementById('passMsg');
    const loginBtn = document.getElementById('loginBtn');
    const loginStatus = document.getElementById('loginStatus');

    // Demo password
    const DEMO_PASSWORD = 'admin123';

    // When user types officer ID, show password field
    officerIdEl.addEventListener('input', () => {
      const val = officerIdEl.value.trim();
      if (val.length >= 3) {
        stepPassword.style.display = 'block';
        loginBtn.style.display = 'block';
      } else {
        stepPassword.style.display = 'none';
        loginBtn.style.display = 'none';
      }
      passMsg.innerHTML = '';
      loginStatus.innerHTML = '';
    });

    // Login
    loginBtn.addEventListener('click', () => {
      const id = officerIdEl.value.trim();
      const pass = passwordInput.value.trim();

      if (id.length < 3) {
        passMsg.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle"></i> Enter a valid Officer ID first</span>';
        return;
      }
      if (!pass) {
        passMsg.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle"></i> Please enter your password</span>';
        return;
      }
      if (pass !== DEMO_PASSWORD) {
        passMsg.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle"></i> Invalid password. Try again.</span>';
        return;
      }

      // Success
      passMsg.innerHTML = '<span class="text-success"><i class="bi bi-patch-check-fill"></i> Password verified</span>';
      loginStatus.innerHTML = '<span class="text-success fw-bold">Redirecting to dashboard...</span>';
      officerIdEl.disabled = true;
      passwordInput.disabled = true;
      loginBtn.disabled = true;

      setTimeout(() => {
        sessionStorage.setItem('officer_name', id);
        sessionStorage.setItem('logged_in', 'true');
        window.location.href = 'dashboard.html';
      }, 600);
    });

    // Allow Enter key to submit
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });
  </script>
</body>
</html>
