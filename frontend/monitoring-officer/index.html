<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Officer Login — Grievance Verification System</title>
  <meta name="description" content="Secure login portal for Monitoring Officers to access the Grievance Resolution Verification Dashboard">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-icon"><i class="bi bi-shield-check"></i></div>
      <h2>Monitoring Officer Portal</h2>
      <p class="subtitle">Grievance Resolution Verification System</p>

      <form id="loginForm" autocomplete="off">
        <!-- Step 1: Officer ID -->
        <div class="mb-3" id="stepOfficerId">
          <label class="form-label" for="officerId">Officer ID / Mobile Number</label>
          <input type="text" class="form-control" id="officerId" placeholder="Enter Officer ID or Mobile" required>
        </div>

        <!-- Step 2: Password -->
        <div class="mb-3" id="stepPassword" style="display:none;">
          <label class="form-label" for="passwordInput">Password</label>
          <input type="password" class="form-control" id="passwordInput" placeholder="Enter your password">
          <div class="otp-msg" id="passMsg"></div>
        </div>

        <!-- Login Button -->
        <button type="button" class="btn btn-primary-custom mt-3" id="loginBtn" style="display:none;">
          <i class="bi bi-box-arrow-in-right me-1"></i> Login to Dashboard
        </button>
      </form>

      <div class="text-center mt-3" id="loginStatus"></div>
    </div>
  </div>

  <script>
    const officerIdEl = document.getElementById('officerId');
    const stepPassword = document.getElementById('stepPassword');
    const passwordInput = document.getElementById('passwordInput');
    const passMsg = document.getElementById('passMsg');
    const loginBtn = document.getElementById('loginBtn');
    const loginStatus = document.getElementById('loginStatus');

    // Static user map (fallback if backend is down)
    const USERS = {
      "admin": { password: "1234", role: "collector", user_id: 4 },
      "officer1": { password: "1234", role: "field_officer", user_id: 1 },
      "officer2": { password: "1234", role: "field_officer", user_id: 3 },
      "collector1": { password: "1234", role: "collector", user_id: 4 }
    };

    // When user types officer ID, show password field
    officerIdEl.addEventListener('input', () => {
      const val = officerIdEl.value.trim();
      if (val.length >= 3) {
        stepPassword.style.display = 'block';
        loginBtn.style.display = 'block';
      } else {
        stepPassword.style.display = 'none';
        loginBtn.style.display = 'none';
      }
      passMsg.innerHTML = '';
      loginStatus.innerHTML = '';
    });

    // Login
    loginBtn.addEventListener('click', async () => {
      const username = officerIdEl.value.trim().toLowerCase();
      const password = passwordInput.value.trim();

      if (username.length < 3) {
        passMsg.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle"></i> Enter a valid Officer ID first</span>';
        return;
      }
      if (!password) {
        passMsg.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle"></i> Please enter your password</span>';
        return;
      }

      // Try backend API first
      try {
        const formData = new FormData();
        formData.append("username", username);
        formData.append("password", password);

        const res = await fetch("http://127.0.0.1:8000/login/", {
          method: "POST",
          body: formData
        });

        const data = await res.json();
        console.log("Login Response:", data);

        if (data.status === "success") {
          handleLoginSuccess(username, data.role, data.user_id);
          return;
        } else {
          passMsg.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle"></i> Invalid credentials ❌</span>';
          return;
        }
      } catch (error) {
        console.warn("Backend unavailable, using static auth:", error.message);
      }

      // Fallback: static user map
      const user = USERS[username];
      if (!user) {
        passMsg.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle"></i> User not found</span>';
        return;
      }
      if (user.password !== password) {
        passMsg.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle"></i> Invalid password. Try again.</span>';
        return;
      }

      handleLoginSuccess(username, user.role, user.user_id);
    });

    function handleLoginSuccess(username, role, userId) {
      passMsg.innerHTML = '<span class="text-success"><i class="bi bi-patch-check-fill"></i> Login successful ✅</span>';
      loginStatus.innerHTML = '<span class="text-success fw-bold">Redirecting to dashboard...</span>';
      officerIdEl.disabled = true;
      passwordInput.disabled = true;
      loginBtn.disabled = true;

      // Store session
      sessionStorage.setItem('username', username);
      sessionStorage.setItem('officer_name', username);
      sessionStorage.setItem('role', role);
      sessionStorage.setItem('user_id', userId);
      sessionStorage.setItem('logged_in', 'true');

      // Role-based redirect
      setTimeout(() => {
        if (role === 'collector') {
          window.location.href = 'dashboard.html';
        } else {
          // Field officers shouldn't be on monitoring portal, but handle gracefully
          window.location.href = 'dashboard.html';
        }
      }, 600);
    }

    // Allow Enter key to submit
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });
  </script>
</body>
</html>
